<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
  <title>Подкидной Дурак • Сеть</title>
  <!-- PeerJS CDN для WebRTC мультиплеера -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    /* ===== ОСНОВНЫЕ ПЕРЕМЕННЫЕ И СБРОС ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-table: #0e3b2c;
      --bg-felt: #134a37;
      --bg-felt-light: #1d5c44;
      --gold: #f0ce6e;
      --gold-bright: #ffe9a8;
      --gold-dark: #b8962e;
      --card-bg: #fef9ec;
      --card-bg-2: #fff;
      --card-shadow: 0 10px 24px rgba(0,0,0,0.55), 0 2px 4px rgba(0,0,0,0.35);
      --text-light: #f3e9c8;
      --text-dark: #2c2416;
      --red-suit: #c0392b;
      --black-suit: #1c1c1c;
      --danger: #c0563b;
      --button-primary: #7a5c3a;
      --border-radius: 12px;
      --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
      --font-display: 'Playfair Display', 'Georgia', 'Times New Roman', serif;
      --font-main: 'Segoe UI', 'Georgia', 'Times New Roman', serif;
    }

    @keyframes feltShimmer {
      0%, 100% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
    }

    @keyframes bgGlow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.9; }
    }

    body {
      background: #1c1c12;
      font-family: var(--font-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(212,175,55,0.10) 0%, transparent 45%),
        radial-gradient(circle at 80% 80%, rgba(30,80,55,0.35) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, #2a2a1c 0%, #161610 100%);
      overflow-x: hidden;
    }

    /* ===== Декоративные плавающие искры ===== */
    .ambient-sparkle {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,233,168,0.9) 0%, rgba(255,233,168,0) 70%);
      pointer-events: none;
      z-index: 0;
      animation: floatSparkle linear infinite;
      opacity: 0;
    }

    @keyframes floatSparkle {
      0% { transform: translateY(0) translateX(0) scale(0.5); opacity: 0; }
      10% { opacity: 0.6; }
      50% { opacity: 0.9; }
      90% { opacity: 0; }
      100% { transform: translateY(-120vh) translateX(20px) scale(1.2); opacity: 0; }
    }

    #app {
      width: 100%;
      max-width: 1000px;
      background: linear-gradient(160deg, #134a37 0%, #0e3b2c 55%, #0b3326 100%);
      border-radius: 32px;
      box-shadow:
        0 30px 60px rgba(0,0,0,0.85),
        inset 0 2px 8px rgba(255,255,200,0.25),
        inset 0 0 60px rgba(0,0,0,0.35);
      padding: 24px 20px 30px;
      border: 2px solid #5e4a2e;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 1;
      animation: appEntrance 0.7s var(--ease-smooth);
      transition: box-shadow 0.4s ease;
    }

    @keyframes appEntrance {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* тонкая золотая обводка-свечение по краю стола */
    #app::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 34px;
      background: linear-gradient(135deg, rgba(240,206,110,0.25), transparent 30%, transparent 70%, rgba(240,206,110,0.18));
      pointer-events: none;
      z-index: -1;
      filter: blur(6px);
      animation: bgGlow 6s ease-in-out infinite;
    }

    /* ===== ЭКРАНЫ ===== */
    .screen {
      display: none;
      flex-direction: column;
      gap: 24px;
    }

    .screen.active {
      display: flex;
      animation: screenFadeIn 0.5s var(--ease-smooth);
    }

    @keyframes screenFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== ЛОББИ ===== */
    .lobby-panel {
      background: linear-gradient(160deg, #2f5238 0%, #244134 100%);
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 8px 24px rgba(0,0,0,0.4);
      border: 1px solid var(--gold-dark);
      display: flex;
      flex-direction: column;
      gap: 22px;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .lobby-panel::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(240,206,110,0.06) 0%, transparent 60%);
      animation: rotateGlow 18s linear infinite;
      pointer-events: none;
    }

    @keyframes rotateGlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .lobby-title {
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 3px 3px 0 #16291a, 0 0 24px rgba(240,206,110,0.35);
      letter-spacing: 3px;
      text-align: center;
      position: relative;
      z-index: 1;
      animation: titlePulse 4s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { text-shadow: 3px 3px 0 #16291a, 0 0 24px rgba(240,206,110,0.35); }
      50% { text-shadow: 3px 3px 0 #16291a, 0 0 40px rgba(255,233,168,0.6); }
    }

    .lobby-title .suit-spin {
      display: inline-block;
      animation: suitFloat 3s ease-in-out infinite;
    }

    .lobby-title .suit-spin:nth-child(2) {
      animation-delay: 1.5s;
    }

    @keyframes suitFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(8deg); }
    }

    .input-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    input {
      background: #f5efdb;
      border: 2px solid #b49b6b;
      padding: 14px 18px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-dark);
      outline: none;
      flex: 2;
      min-width: 200px;
      transition: border-color 0.25s var(--ease-smooth), box-shadow 0.25s var(--ease-smooth), transform 0.15s ease;
      position: relative;
      z-index: 1;
    }

    input:hover {
      border-color: #d4b86f;
    }

    input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(240,206,110,0.25), 0 0 16px rgba(240,206,110,0.4);
      transform: translateY(-1px);
    }

    .btn {
      background: linear-gradient(180deg, #7d6a47 0%, #6b5a3b 100%);
      border: none;
      color: var(--text-light);
      font-weight: bold;
      padding: 14px 28px;
      border-radius: 40px;
      font-size: 1.1rem;
      letter-spacing: 0.8px;
      cursor: pointer;
      box-shadow: 0 6px 0 #3b2e1c, 0 8px 18px rgba(0,0,0,0.5);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.2s ease, background 0.3s ease;
      border: 1px solid #ac8e5a;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      user-select: none;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -75%;
      width: 50%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: skewX(-20deg);
      transition: left 0.6s ease;
    }

    .btn:hover {
      filter: brightness(1.12);
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #3b2e1c, 0 12px 24px rgba(0,0,0,0.55);
    }

    .btn:hover::before {
      left: 130%;
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #3b2e1c, 0 5px 12px rgba(0,0,0,0.5);
      filter: brightness(0.96);
    }

    .btn:disabled {
      opacity: 0.5;
      transform: translateY(2px);
      box-shadow: 0 3px 0 #3b2e1c;
      pointer-events: none;
    }

    .room-info {
      background: #1f3322;
      padding: 12px 22px;
      border-radius: 30px;
      color: var(--gold);
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
      z-index: 1;
      animation: roomInfoPop 0.4s var(--ease-out-back);
      box-shadow: inset 0 0 12px rgba(0,0,0,0.5);
    }

    @keyframes roomInfoPop {
      from { opacity: 0; transform: scale(0.9) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .copy-link {
      background: transparent;
      border: 1px dashed var(--gold);
      color: var(--gold);
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background 0.2s ease, transform 0.15s ease, border-color 0.2s ease;
    }

    .copy-link:hover {
      background: rgba(240,206,110,0.2);
      transform: translateY(-1px);
      border-color: var(--gold-bright);
    }

    .copy-link:active {
      background: rgba(240,206,110,0.4);
      transform: translateY(0px) scale(0.98);
    }

    #lobbyStatus {
      position: relative;
      z-index: 1;
      transition: color 0.3s ease;
      min-height: 1.2em;
    }

    #manualCopyWrap {
      animation: roomInfoPop 0.4s var(--ease-out-back);
    }

    #manualCopyField {
      background: #1f3322;
      border: 1px dashed var(--gold);
      color: var(--gold-bright);
      padding: 10px 16px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }

    #manualCopyField:focus {
      box-shadow: 0 0 12px rgba(240,206,110,0.4);
      border-color: var(--gold-bright);
    }

    /* ===== ИГРОВОЙ СТОЛ ===== */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-light);
      font-weight: bold;
      background: linear-gradient(135deg, #20452f 0%, #1a3623 100%);
      padding: 10px 20px;
      border-radius: 50px;
      border-bottom: 3px solid var(--gold-dark);
      flex-wrap: wrap;
      gap: 10px;
      box-shadow: inset 0 1px 4px rgba(255,255,255,0.06), 0 4px 10px rgba(0,0,0,0.3);
    }

    .player-tag {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      line-height: 1.1;
      transition: color 0.3s ease, text-shadow 0.3s ease, transform 0.3s ease;
    }

    .player-tag .ptag-role {
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      font-weight: 600;
      color: #9fc6a8;
      text-transform: uppercase;
      opacity: 0.75;
    }

    .player-tag .ptag-name {
      font-size: 1rem;
    }

    .turn-active {
      color: var(--gold-bright) !important;
      text-shadow: 0 0 12px rgba(255,233,168,0.7);
      animation: turnGlow 1.6s ease-in-out infinite;
    }

    .turn-active .ptag-role {
      color: var(--gold-bright) !important;
      opacity: 1;
    }

    @keyframes turnGlow {
      0%, 100% { text-shadow: 0 0 8px rgba(255,233,168,0.4); }
      50% { text-shadow: 0 0 18px rgba(255,233,168,0.9); }
    }

    .trump-badge {
      background: #00000040;
      padding: 6px 16px;
      border-radius: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
      transition: transform 0.2s ease;
      animation: trumpFloat 4s ease-in-out infinite;
    }

    .trump-badge .trump-label {
      font-size: 0.62rem;
      letter-spacing: 1.5px;
      font-weight: 600;
      color: #cbb786;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .trump-badge .trump-icon {
      font-size: 1.5rem;
      line-height: 1;
    }

    .trump-badge .trump-icon.trump-red {
      color: var(--red-suit);
    }

    .trump-badge .deck-count {
      font-size: 0.7rem;
      color: var(--gold-bright);
      font-weight: 700;
      letter-spacing: 0.5px;
      opacity: 0.9;
    }

    @keyframes trumpFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    .opponent-area, .player-area {
      background: linear-gradient(160deg, #20402c 0%, #1a3323 100%);
      border-radius: 28px;
      padding: 16px 20px;
      box-shadow: inset 0 0 16px rgba(0,0,0,0.6);
      transition: box-shadow 0.4s ease;
    }

    .player-area.active-turn-highlight {
      box-shadow: inset 0 0 16px rgba(0,0,0,0.6), 0 0 0 2px rgba(240,206,110,0.4), 0 0 24px rgba(240,206,110,0.2);
    }

    .area-label {
      color: #ccb27c;
      margin-bottom: 8px;
      font-weight: bold;
      transition: color 0.3s ease;
    }

    .cards-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      min-height: 100px;
      padding: 10px 0;
    }

    /* ===== КАРТЫ ===== */
    .card {
      width: 80px;
      height: 120px;
      background: linear-gradient(160deg, var(--card-bg-2) 0%, var(--card-bg) 100%);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      box-shadow: var(--card-shadow);
      position: relative;
      transition: transform 0.28s var(--ease-smooth), opacity 0.28s ease, box-shadow 0.28s ease, filter 0.25s ease;
      cursor: default;
      border: 2px solid #ab8e5c;
      color: var(--black-suit);
      user-select: none;
      animation: cardDeal 0.45s var(--ease-out-back) backwards;
    }

    @keyframes cardDeal {
      from {
        opacity: 0;
        transform: translateY(-30px) scale(0.7) rotate(-8deg);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
      }
    }

    .card.red {
      color: var(--red-suit);
    }

    .card--playable {
      cursor: pointer;
      box-shadow: 0 0 22px #f3cd5e, 0 8px 18px rgba(0,0,0,0.6);
      border-color: var(--gold);
      transform: translateY(-8px);
      animation: cardDeal 0.45s var(--ease-out-back) backwards, pulse-gold 1.8s ease-in-out infinite;
    }

    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 18px #f3cd5e, 0 8px 18px rgba(0,0,0,0.6); transform: translateY(-8px); }
      50% { box-shadow: 0 0 36px #ffe484, 0 10px 22px rgba(0,0,0,0.6); transform: translateY(-11px); }
    }

    .card--playable:hover {
      transform: translateY(-14px) scale(1.07) rotate(-1deg);
      box-shadow: 0 0 42px #ffe9a8, 0 14px 26px rgba(0,0,0,0.65);
      animation: cardDeal 0.45s var(--ease-out-back) backwards;
      z-index: 5;
    }

    .card--playable:active {
      transform: translateY(-4px) scale(1.02);
      transition: transform 0.08s ease;
    }

    .card--blocked {
      opacity: 0.6;
      filter: grayscale(0.3);
      pointer-events: none;
      transform: none;
      animation: cardDeal 0.45s var(--ease-out-back) backwards;
    }

    /* Карты соперника - рубашка */
    .card--back {
      background: linear-gradient(135deg, #1a3a52 0%, #0d2233 60%, #1a3a52 100%);
      border-color: var(--gold-dark);
      position: relative;
      overflow: hidden;
    }

    .card--back::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1.5px solid rgba(240,206,110,0.45);
      border-radius: 8px;
      background:
        repeating-linear-gradient(45deg, rgba(240,206,110,0.08) 0px, rgba(240,206,110,0.08) 4px, transparent 4px, transparent 10px);
    }

    .card--back .card-rank,
    .card--back .card-suit {
      display: none;
    }

    .card--back::after {
      content: '♕';
      position: absolute;
      font-size: 1.8rem;
      color: rgba(240,206,110,0.55);
      text-shadow: 0 0 10px rgba(240,206,110,0.3);
    }

    .card-rank {
      font-size: 2.2rem;
      line-height: 1;
    }

    .card-suit {
      font-size: 2rem;
      margin-top: -4px;
    }

    /* ===== СТОЛ ===== */
    .table-center {
      background: radial-gradient(ellipse at center, #2e5437 0%, #20402b 100%);
      border-radius: 40px;
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 18px;
      min-height: 140px;
      border: 2px dashed #c4a35a;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }

    .table-center:empty::after {
      content: 'Стол пуст';
      color: rgba(196,163,90,0.4);
      font-size: 1rem;
      font-style: italic;
      letter-spacing: 1px;
    }

    .table-pair {
      display: flex;
      gap: 10px;
      align-items: center;
      animation: pairAppear 0.4s var(--ease-out-back);
    }

    @keyframes pairAppear {
      from { opacity: 0; transform: scale(0.7) translateY(14px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .table-vs {
      color: #e0c47a;
      font-size: 1.5rem;
      display: inline-block;
      animation: clashSwing 0.5s var(--ease-out-back);
      filter: drop-shadow(0 0 6px rgba(224,196,122,0.6));
    }

    @keyframes clashSwing {
      0% { transform: scale(0.4) rotate(-30deg); opacity: 0; }
      60% { transform: scale(1.3) rotate(10deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); }
    }

    .table-pair .card.red.defense-card,
    .table-pair .card.defense-card {
      transform: translateY(-12px) rotate(6deg);
    }

    /* ===== КНОПКИ ДЕЙСТВИЙ ===== */
    .action-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      min-height: 56px;
    }

    .action-buttons .btn {
      animation: actionBtnPop 0.35s var(--ease-out-back);
    }

    @keyframes actionBtnPop {
      from { opacity: 0; transform: scale(0.6) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    #beatButton {
      background: linear-gradient(180deg, #5a8f6c 0%, #3d7351 100%);
      border-color: #6fb583;
      box-shadow: 0 6px 0 #1f4a2e, 0 8px 18px rgba(0,0,0,0.5);
    }

    #beatButton:hover {
      box-shadow: 0 8px 0 #1f4a2e, 0 12px 24px rgba(0,0,0,0.55);
    }

    #beatButton:active {
      box-shadow: 0 2px 0 #1f4a2e, 0 5px 12px rgba(0,0,0,0.5);
    }

    #takeButton {
      background: linear-gradient(180deg, #c0563b 0%, #a3422a 100%);
      border-color: #e08363;
      box-shadow: 0 6px 0 #5e2417, 0 8px 18px rgba(0,0,0,0.5);
    }

    #takeButton:hover {
      box-shadow: 0 8px 0 #5e2417, 0 12px 24px rgba(0,0,0,0.55);
    }

    #takeButton:active {
      box-shadow: 0 2px 0 #5e2417, 0 5px 12px rgba(0,0,0,0.5);
    }

    .status-badge {
      font-size: 1.1rem;
      background: linear-gradient(135deg, #00000060, #00000040);
      padding: 8px 20px;
      border-radius: 30px;
      color: var(--gold);
      text-align: center;
      font-weight: bold;
      transition: color 0.3s ease, transform 0.3s ease;
      animation: statusFadeIn 0.35s var(--ease-smooth);
    }

    @keyframes statusFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .status-badge.win {
      color: #8de0a3;
      text-shadow: 0 0 14px rgba(141,224,163,0.6);
    }

    .status-badge.lose {
      color: #e0a08d;
      text-shadow: 0 0 14px rgba(224,160,141,0.5);
    }

    .status-badge.draw {
      color: var(--gold-bright);
    }

    .log-panel {
      background: #0c261a;
      border-radius: 20px;
      padding: 10px 18px;
      color: #cbb786;
      font-style: italic;
      text-align: center;
      min-height: 40px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
      transition: color 0.2s ease;
    }

    .log-panel.log-update {
      animation: logFlash 0.4s ease;
    }

    @keyframes logFlash {
      0% { color: var(--gold-bright); }
      100% { color: #cbb786; }
    }

    /* ===== МОДАЛЬНОЕ ОКНО КОНЦА ИГРЫ ===== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.0);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
      transition: background 0.4s ease;
      overflow: hidden;
    }

    .modal-overlay.show {
      background: rgba(0,0,0,0.85);
    }

    .modal-content {
      background: linear-gradient(160deg, #355c3e 0%, #2e4030 100%);
      padding: 40px 50px;
      border-radius: 40px;
      text-align: center;
      color: var(--gold);
      font-weight: bold;
      border: 3px solid var(--gold-dark);
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 60px rgba(240,206,110,0.15);
      cursor: default;
      transform: scale(0.7) translateY(40px);
      opacity: 0;
      transition: transform 0.45s var(--ease-out-back), opacity 0.35s ease, box-shadow 0.6s ease, border-color 0.6s ease;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      max-width: 92vw;
      overflow: hidden;
    }

    .modal-overlay.show .modal-content {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    /* --- Заголовок результата --- */
    .modal-result-title {
      font-size: 2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      position: relative;
      z-index: 2;
    }

    .modal-result-sub {
      font-size: 1rem;
      color: #d8c89a;
      font-weight: 600;
      opacity: 0.9;
      position: relative;
      z-index: 2;
    }

    /* --- VS блок участников --- */
    .modal-vs-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin: 6px 0 2px;
      position: relative;
      z-index: 2;
    }

    .modal-player-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 18px;
      background: rgba(0,0,0,0.25);
      min-width: 90px;
      transition: transform 0.4s var(--ease-out-back), box-shadow 0.4s ease, background 0.4s ease;
      transform: scale(0.85);
      opacity: 0;
    }

    .modal-overlay.show .modal-player-chip {
      opacity: 1;
      transform: scale(1);
      transition-delay: 0.15s;
    }

    .modal-player-chip.is-winner {
      background: rgba(141,224,163,0.18);
      box-shadow: 0 0 22px rgba(141,224,163,0.35), inset 0 0 12px rgba(141,224,163,0.15);
      transition-delay: 0.25s;
    }

    .modal-player-chip.is-loser {
      filter: grayscale(0.35) brightness(0.85);
      transform: scale(0.92);
    }

    .modal-overlay.show .modal-player-chip.is-winner {
      animation: winnerChipBounce 0.6s var(--ease-out-back) 0.25s;
    }

    @keyframes winnerChipBounce {
      0% { transform: scale(0.85); }
      55% { transform: scale(1.18); }
      100% { transform: scale(1.05); }
    }

    .modal-player-chip .chip-name {
      font-size: 1.05rem;
      color: var(--text-light);
      font-weight: 700;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .modal-player-chip.is-winner .chip-name {
      color: #b9f5c7;
      text-shadow: 0 0 10px rgba(141,224,163,0.6);
    }

    .modal-player-chip.is-loser .chip-name {
      color: #c9b89a;
    }

    .modal-player-chip .chip-badge {
      font-size: 1.6rem;
      line-height: 1;
      height: 1.7rem;
    }

    .modal-player-chip.is-winner .chip-badge {
      animation: chipCrownBob 1.6s ease-in-out infinite;
    }

    @keyframes chipCrownBob {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50% { transform: translateY(-4px) rotate(4deg); }
    }

    .modal-vs-symbol {
      font-size: 1.7rem;
      color: #e0c47a;
      opacity: 0;
      transform: scale(0.3) rotate(-25deg);
      filter: drop-shadow(0 0 6px rgba(224,196,122,0.6));
    }

    .modal-overlay.show .modal-vs-symbol {
      animation: modalVsClash 0.6s var(--ease-out-back) 0.05s forwards;
    }

    @keyframes modalVsClash {
      0% { opacity: 0; transform: scale(0.3) rotate(-35deg); }
      55% { opacity: 1; transform: scale(1.5) rotate(15deg); }
      75% { transform: scale(0.9) rotate(-6deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .modal-overlay.show .modal-vs-symbol.vs-win {
      animation: modalVsWin 1.8s ease-in-out 0.65s infinite;
    }

    @keyframes modalVsWin {
      0%, 100% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 6px rgba(224,196,122,0.6)); }
      50% { transform: scale(1.25) rotate(8deg); filter: drop-shadow(0 0 18px rgba(255,233,168,0.9)); }
    }

    .modal-overlay.show .modal-vs-symbol.vs-lose {
      animation: modalVsLose 2s ease-in-out 0.65s infinite;
    }

    @keyframes modalVsLose {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.6; }
      50% { transform: scale(0.85) rotate(0deg); opacity: 0.95; }
    }

    /* --- Корона для победы --- */
    .crown-wrap {
      position: relative;
      height: 64px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .crown-icon {
      font-size: 3.4rem;
      filter: drop-shadow(0 0 10px rgba(255,233,168,0.5));
      opacity: 0;
      transform: translateY(-30px) scale(0.4) rotate(-25deg);
    }

    .modal-overlay.show .crown-icon.anim-win {
      animation: crownDropIn 0.7s var(--ease-out-back) 0.1s forwards, crownGlow 2s ease-in-out 0.9s infinite, crownSway 3.2s ease-in-out 0.9s infinite;
    }

    @keyframes crownDropIn {
      0% { opacity: 0; transform: translateY(-50px) scale(0.3) rotate(-35deg); }
      60% { opacity: 1; transform: translateY(6px) scale(1.25) rotate(10deg); }
      80% { transform: translateY(-4px) scale(0.95) rotate(-4deg); }
      100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    }

    @keyframes crownGlow {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(255,233,168,0.5)); }
      50% { filter: drop-shadow(0 0 28px rgba(255,233,168,1)); }
    }

    @keyframes crownSway {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50% { transform: translateY(-3px) rotate(4deg); }
    }

    .modal-overlay.show .crown-icon.anim-lose {
      animation: crownDropFall 1.1s var(--ease-smooth) 0.1s forwards;
      filter: drop-shadow(0 0 6px rgba(224,160,141,0.3)) grayscale(0.5);
    }

    @keyframes crownDropFall {
      0% { opacity: 0; transform: translateY(-50px) scale(0.4) rotate(0deg); }
      35% { opacity: 0.9; transform: translateY(6px) scale(1.05) rotate(8deg); }
      55% { transform: translateY(0px) scale(1) rotate(-10deg); }
      75% { transform: translateY(4px) scale(0.95) rotate(60deg); }
      100% { opacity: 0.55; transform: translateY(10px) scale(0.85) rotate(95deg); }
    }

    /* --- Конфетти для победы --- */
    .confetti-piece {
      position: absolute;
      top: -10%;
      border-radius: 2px;
      opacity: 0;
      z-index: 1;
      pointer-events: none;
    }

    .modal-overlay.show .confetti-piece {
      animation-name: confettiFall;
      animation-timing-function: cubic-bezier(0.4, 0.0, 0.2, 1);
      animation-fill-mode: forwards;
      animation-iteration-count: infinite;
    }

    @keyframes confettiFall {
      0% {
        opacity: 0;
        transform: translate(0, -20px) rotate(0deg);
      }
      8% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(var(--drift, 30px), 340px) rotate(var(--spin, 360deg));
      }
    }

    /* --- Дрожь и тусклый фон для проигрыша --- */
    .modal-overlay.show .modal-content.result-lose {
      animation: loseShake 0.55s ease 0.05s 1;
    }

    @keyframes loseShake {
      0%, 100% { transform: scale(1) translateY(0) translateX(0); }
      20% { transform: scale(1.01) translateY(0) translateX(-6px); }
      40% { transform: scale(1.01) translateY(0) translateX(5px); }
      60% { transform: scale(1.01) translateY(0) translateX(-3px); }
      80% { transform: scale(1.01) translateY(0) translateX(2px); }
    }

    .modal-content.result-win {
      border-color: var(--gold-bright);
    }

    .modal-overlay.show .modal-content.result-win {
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 80px rgba(255,233,168,0.35);
    }

    .modal-content.result-lose {
      border-color: #7a4a3a;
    }

    .modal-overlay.show .modal-content.result-lose {
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 50px rgba(192,86,59,0.2);
    }

    .modal-content.result-draw {
      border-color: var(--gold-dark);
    }

    .modal-hint {
      font-size: 0.8rem;
      color: #9fb8a3;
      font-weight: 500;
      opacity: 0.7;
      margin-top: 2px;
      position: relative;
      z-index: 2;
    }

    /* ===== АДАПТИВ ===== */
    @media (max-width: 600px) {
      .card {
        width: 60px;
        height: 90px;
      }
      .card-rank {
        font-size: 1.6rem;
      }
      .card-suit {
        font-size: 1.4rem;
      }
      .lobby-title {
        font-size: 2rem;
      }
      .modal-result-title {
        font-size: 1.5rem;
      }
      .crown-icon {
        font-size: 2.6rem;
      }
      .modal-content {
        padding: 28px 22px;
      }
      .modal-player-chip {
        min-width: 70px;
        padding: 8px 12px;
      }
      .modal-player-chip .chip-name {
        font-size: 0.9rem;
        max-width: 100px;
      }
    }

    /* ===== УВАЖЕНИЕ К reduced-motion ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      .ambient-sparkle { display: none; }
      .confetti-piece { display: none; }
    }
  </style>
</head>
<body>
<div id="app">
  <!-- ===== ЭКРАН ЛОББИ ===== -->
  <div id="lobbyScreen" class="screen active">
    <div class="lobby-panel">
      <div class="lobby-title"><span class="suit-spin">♢</span> ПОДКИДНОЙ ДУРАК <span class="suit-spin">♤</span></div>
      <div style="color: #d4c098; font-weight: bold;">Ваше имя:</div>
      <input type="text" id="playerNameInput" placeholder="Введите имя" value="Игрок" maxlength="14" autocomplete="off">
      <div class="input-group">
        <button id="hostGameBtn" class="btn">🎩 СОЗДАТЬ СТОЛ</button>
        <button id="connectBtn" class="btn">🔗 ПОДКЛЮЧИТЬСЯ</button>
      </div>
      <div style="display: flex; gap: 12px; align-items: center; width: 100%; flex-wrap: wrap;">
        <input type="text" id="remoteRoomId" placeholder="Введите ID комнаты" autocomplete="off">
      </div>
      <div id="roomDisplay" class="room-info" style="display: none;"></div>
      <div id="lobbyStatus" style="color: #cbb786; text-align: center;"></div>
    </div>
  </div>

  <!-- ===== ИГРОВОЙ ЭКРАН ===== -->
  <div id="gameScreen" class="screen">
    <div class="game-header">
      <div class="player-tag" id="opponentTag">
        <span class="ptag-role">Соперник</span>
        <span class="ptag-name" id="opponentNameDisplay">Соперник</span>
      </div>
      <span class="trump-badge" id="trumpDisplay">
        <span class="trump-label">Козырь</span>
        <span class="trump-icon" id="trumpIcon">♣</span>
        <span class="deck-count" id="deckCountDisplay">36 в колоде</span>
      </span>
      <div class="player-tag" id="playerTag">
        <span class="ptag-role">Вы</span>
        <span class="ptag-name" id="playerNameDisplay">Вы</span>
      </div>
    </div>

    <div class="opponent-area">
      <div class="area-label">✋ Рука соперника (<span id="opponentCardCount">0</span>)</div>
      <div class="cards-row" id="opponentCardsRow"></div>
    </div>

    <div class="table-center" id="tableContainer"></div>

    <div class="action-buttons" id="actionContainer">
      <button id="beatButton" class="btn" style="display: none;">🛡️ БИТО</button>
      <button id="takeButton" class="btn" style="display: none;">📥 ВЗЯТЬ</button>
    </div>

    <div class="player-area" id="playerArea">
      <div class="area-label">🃏 Ваша рука (<span id="playerCardCount">0</span>)</div>
      <div class="cards-row" id="playerCardsRow"></div>
    </div>

    <div class="status-badge" id="statusMessage">Ожидание...</div>
    <div class="log-panel" id="logMessage">⌛ Готовность</div>
  </div>
</div>

<!-- ===== МОДАЛКА КОНЦА ИГРЫ ===== -->
<div id="gameOverModal" class="modal-overlay" style="display: none;">
  <div class="modal-content" id="gameOverContent">
    <!-- содержимое генерируется в JS -->
  </div>
</div>

<script>
  (function() {
    // ==========================================
    // КОНФИГУРАЦИЯ КАРТ И КОНСТАНТЫ
    // ==========================================
    const SUITS = ['♠', '♥', '♦', '♣'];
    const RANKS = [6, 7, 8, 9, 10, 11, 12, 13, 14]; // 11=J, 12=Q, 13=K, 14=A
    const RED_SUITS = ['♥', '♦'];
    const RANK_SYMBOLS = { 11: 'J', 12: 'Q', 13: 'K', 14: 'A' };

    // ==========================================
    // ГЛОБАЛЬНОЕ СОСТОЯНИЕ ИГРЫ
    // Только Хост хранит и модифицирует эту структуру
    // ==========================================
    let gameState = {
      deck: [],               // Колода (верхушка - конец массива)
      trumpCard: null,        // Козырная карта (последняя в колоде)
      trumpSuit: null,        // Масть козыря
      players: {
        host: { hand: [], name: 'Хост' },
        guest: { hand: [], name: 'Гость' }
      },
      table: [],              // [{ attack: card, defense: card|null }]
      discardPile: [],        // Отбой (битые карты)
      attacker: null,         // 'host' или 'guest'
      defender: null,         // 'host' или 'guest'
      currentPhase: 'attack-initial', // 'attack-initial' | 'defend' | 'attack-continue'
      turnOwner: null,        // Кто сейчас должен ходить
      gameOver: false,
      winner: null            // 'host' | 'guest' | 'draw'
    };

    // ==========================================
    // ПЕРЕМЕННЫЕ СЕТИ И ЛОКАЛЬНЫЕ
    // ==========================================
    let peer = null;          // Экземпляр PeerJS
    let conn = null;          // DataConnection
    let myRole = null;        // 'host' или 'guest'
    let myPlayerId = null;    // 'host' или 'guest'
    let opponentId = null;    // 'host' или 'guest'
    let localName = '';       // Имя локального игрока
    let opponentName = '';    // Имя соперника
    let handshakeComplete = false; // Флаг для хоста: гость прислал ready_to_receive

    // ==========================================
    // DOM ЭЛЕМЕНТЫ
    // ==========================================
    const lobbyScreen = document.getElementById('lobbyScreen');
    const gameScreen = document.getElementById('gameScreen');
    const playerNameInput = document.getElementById('playerNameInput');
    const hostGameBtn = document.getElementById('hostGameBtn');
    const connectBtn = document.getElementById('connectBtn');
    const remoteRoomIdInput = document.getElementById('remoteRoomId');
    const roomDisplay = document.getElementById('roomDisplay');
    const lobbyStatus = document.getElementById('lobbyStatus');
    const opponentNameDisplay = document.getElementById('opponentNameDisplay');
    const playerNameDisplay = document.getElementById('playerNameDisplay');
    const opponentTag = document.getElementById('opponentTag');
    const playerTag = document.getElementById('playerTag');
    const trumpDisplay = document.getElementById('trumpDisplay');
    const trumpIcon = document.getElementById('trumpIcon');
    const deckCountDisplay = document.getElementById('deckCountDisplay');
    const opponentCardCount = document.getElementById('opponentCardCount');
    const playerCardCount = document.getElementById('playerCardCount');
    const opponentCardsRow = document.getElementById('opponentCardsRow');
    const playerCardsRow = document.getElementById('playerCardsRow');
    const tableContainer = document.getElementById('tableContainer');
    const playerArea = document.getElementById('playerArea');
    const beatButton = document.getElementById('beatButton');
    const takeButton = document.getElementById('takeButton');
    const statusMessage = document.getElementById('statusMessage');
    const logMessage = document.getElementById('logMessage');
    const gameOverModal = document.getElementById('gameOverModal');
    const gameOverContent = document.getElementById('gameOverContent');

    // ==========================================
    // АМБИЕНТНЫЕ ИСКРЫ (декоративный фон)
    // ==========================================
    function spawnAmbientSparkles() {
      const count = window.innerWidth < 700 ? 8 : 16;
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'ambient-sparkle';
        const size = 2 + Math.random() * 4;
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.left = Math.random() * 100 + 'vw';
        s.style.bottom = '-10px';
        s.style.animationDuration = (10 + Math.random() * 14) + 's';
        s.style.animationDelay = (Math.random() * 14) + 's';
        document.body.appendChild(s);
      }
    }

    // ==========================================
    // УТИЛИТЫ ДЛЯ КАРТ
    // ==========================================

    /** Создает и перемешивает колоду из 36 карт */
    function createDeck() {
      let deck = [];
      for (let suit of SUITS) {
        for (let rank of RANKS) {
          deck.push({ suit, rank });
        }
      }
      return shuffleArray(deck);
    }

    /** Алгоритм Фишера-Йетса для перемешивания */
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    /** Возвращает строковое представление карты, например "7♠" или "K♥" */
    function cardToString(card) {
      if (!card) return '?';
      const rankDisplay = RANK_SYMBOLS[card.rank] || card.rank;
      return `${rankDisplay}${card.suit}`;
    }

    /** Проверяет, является ли карта козырем */
    function isTrump(card, trumpSuit) {
      return card.suit === trumpSuit;
    }

    /**
     * Проверяет, может ли defenseCard побить attackCard
     * Правила:
     * - Если атака козырем: побить можно только старшим козырем
     * - Если атака не козырем: побить можно козырем или картой той же масти, но старше
     */
    function canBeat(attackCard, defenseCard, trumpSuit) {
      if (!attackCard || !defenseCard) return false;
      if (isTrump(attackCard, trumpSuit)) {
        return isTrump(defenseCard, trumpSuit) && defenseCard.rank > attackCard.rank;
      }
      if (isTrump(defenseCard, trumpSuit)) return true;
      return defenseCard.suit === attackCard.suit && defenseCard.rank > attackCard.rank;
    }

    /** Находит младший козырь в руке (для определения первого хода) */
    function findMinTrump(hand, trumpSuit) {
      let trumps = hand.filter(c => isTrump(c, trumpSuit));
      if (trumps.length === 0) return null;
      return trumps.reduce((min, c) => c.rank < min.rank ? c : min, trumps[0]);
    }

    /** Символ ранга для отображения */
    function rankSymbol(rank) {
      return RANK_SYMBOLS[rank] || rank;
    }

    // ==========================================
    // ИНИЦИАЛИЗАЦИЯ ИГРЫ (ВЫЗЫВАЕТСЯ ТОЛЬКО НА ХОСТЕ)
    // ==========================================
    function initGame() {
      console.log('[HOST] Инициализация игры...');
      gameState.deck = createDeck();
      gameState.table = [];
      gameState.discardPile = [];
      gameState.players.host.hand = [];
      gameState.players.guest.hand = [];
      gameState.gameOver = false;
      gameState.winner = null;

      // Раздача по 6 карт каждому
      for (let i = 0; i < 6; i++) {
        if (gameState.deck.length > 0) gameState.players.host.hand.push(gameState.deck.pop());
        if (gameState.deck.length > 0) gameState.players.guest.hand.push(gameState.deck.pop());
      }

      // Определение козыря: последняя карта колоды
      if (gameState.deck.length > 0) {
        gameState.trumpCard = gameState.deck[gameState.deck.length - 1];
        gameState.trumpSuit = gameState.trumpCard.suit;
      } else {
        // Крайний случай: карт не хватило
        gameState.trumpCard = { suit: SUITS[0], rank: 6 };
        gameState.trumpSuit = SUITS[0];
      }

      // Определение первого атакующего по младшему козырю
      const hostMin = findMinTrump(gameState.players.host.hand, gameState.trumpSuit);
      const guestMin = findMinTrump(gameState.players.guest.hand, gameState.trumpSuit);

      if (!hostMin && !guestMin) {
        // Ни у кого нет козырей — хост атакует
        gameState.attacker = 'host';
        gameState.defender = 'guest';
      } else if (!hostMin) {
        gameState.attacker = 'guest';
        gameState.defender = 'host';
      } else if (!guestMin) {
        gameState.attacker = 'host';
        gameState.defender = 'guest';
      } else {
        gameState.attacker = hostMin.rank <= guestMin.rank ? 'host' : 'guest';
        gameState.defender = gameState.attacker === 'host' ? 'guest' : 'host';
      }

      gameState.currentPhase = 'attack-initial';
      gameState.turnOwner = gameState.attacker;

      console.log('[HOST] Игра готова. Атакующий:', gameState.attacker, 'Козырь:', cardToString(gameState.trumpCard));
    }

    /** Добор карт игроком до 6 (пока есть колода) */
    function drawCards(playerKey) {
      const hand = gameState.players[playerKey].hand;
      while (hand.length < 6 && gameState.deck.length > 0) {
        hand.push(gameState.deck.pop());
      }
    }

    /** Проверка на завершение игры (когда колода пуста) */
    function checkGameOver() {
      if (gameState.deck.length > 0) return false;
      const hostEmpty = gameState.players.host.hand.length === 0;
      const guestEmpty = gameState.players.guest.hand.length === 0;
      if (hostEmpty && guestEmpty) {
        gameState.gameOver = true;
        gameState.winner = 'draw';
      } else if (hostEmpty) {
        gameState.gameOver = true;
        gameState.winner = 'host';
      } else if (guestEmpty) {
        gameState.gameOver = true;
        gameState.winner = 'guest';
      }
      return gameState.gameOver;
    }

    /** Переход хода после "Бито" */
    function advanceTurnAfterBeat() {
      // Отправляем карты со стола в отбой
      gameState.discardPile.push(...gameState.table);
      gameState.table = [];

      // Добор: сначала атакующий, потом защищавшийся
      drawCards(gameState.attacker);
      drawCards(gameState.defender);

      // Ход переходит к бывшему защищавшемуся
      const newAttacker = gameState.defender;
      gameState.attacker = newAttacker;
      gameState.defender = newAttacker === 'host' ? 'guest' : 'host';
      gameState.currentPhase = 'attack-initial';
      gameState.turnOwner = gameState.attacker;
    }

    // ==========================================
    // ОБРАБОТКА ХОДОВ (ВЫЗЫВАЕТСЯ ТОЛЬКО НА ХОСТЕ)
    // ==========================================

    /**
     * Универсальная функция обработки хода.
     * @param {string} playerKey - 'host' или 'guest'
     * @param {object} card - { suit, rank }
     * @returns {boolean} - успешен ли ход
     */
    function processMove(playerKey, card) {
      if (gameState.gameOver) return false;
      if (gameState.turnOwner !== playerKey) return false;

      const hand = gameState.players[playerKey].hand;
      const cardIndex = hand.findIndex(c => c.suit === card.suit && c.rank === card.rank);
      if (cardIndex === -1) return false;

      const phase = gameState.currentPhase;

      // --- Атакующий ходит ---
      if (playerKey === gameState.attacker) {
        if (phase === 'attack-initial') {
          // Первый ход круга: можно положить любую карту
          gameState.table.push({ attack: card, defense: null });
          hand.splice(cardIndex, 1);
          gameState.currentPhase = 'defend';
          gameState.turnOwner = gameState.defender;
          logMessage.textContent = `${gameState.players[playerKey].name} атакует ${cardToString(card)}`;
          return true;
        } else if (phase === 'attack-continue') {
          // Подкидывание: можно только карты рангов, которые уже есть на столе
          const tableRanks = new Set();
          gameState.table.forEach(p => {
            if (p.attack) tableRanks.add(p.attack.rank);
            if (p.defense) tableRanks.add(p.defense.rank);
          });
          if (!tableRanks.has(card.rank)) return false;
          // Нельзя подкинуть больше карт, чем у защищающегося, и не больше 6 за круг
          if (gameState.table.length >= 6) return false;
          if (gameState.players[gameState.defender].hand.length === 0) return false;

          gameState.table.push({ attack: card, defense: null });
          hand.splice(cardIndex, 1);
          gameState.currentPhase = 'defend';
          gameState.turnOwner = gameState.defender;
          logMessage.textContent = `${gameState.players[playerKey].name} подкидывает ${cardToString(card)}`;
          return true;
        }
      }

      // --- Защищающийся отбивается ---
      if (playerKey === gameState.defender && phase === 'defend') {
        const unbeatenPair = gameState.table.find(p => !p.defense);
        if (!unbeatenPair) return false;
        if (canBeat(unbeatenPair.attack, card, gameState.trumpSuit)) {
          unbeatenPair.defense = card;
          hand.splice(cardIndex, 1);
          logMessage.textContent = `${gameState.players[playerKey].name} отбивается ${cardToString(card)}`;

          // Если все карты побиты, переходим в фазу продолжения атаки
          const allBeaten = gameState.table.every(p => p.defense);
          if (allBeaten) {
            gameState.currentPhase = 'attack-continue';
            gameState.turnOwner = gameState.attacker;
          }
          return true;
        }
      }

      return false;
    }

    /** Действие "Бито" (вызывается на хосте) */
    function processBeat() {
      if (gameState.currentPhase !== 'attack-continue') return false;
      const allBeaten = gameState.table.every(p => p.defense);
      if (!allBeaten) return false;

      advanceTurnAfterBeat();
      logMessage.textContent = '✅ Все карты биты. Ход переходит.';
      return true;
    }

    /** Действие "Взять" (вызывается на хосте) */
    function processTake() {
      if (gameState.currentPhase !== 'defend') return false;

      const defenderHand = gameState.players[gameState.defender].hand;
      gameState.table.forEach(p => {
        defenderHand.push(p.attack);
        if (p.defense) defenderHand.push(p.defense);
      });
      gameState.table = [];

      // Добирает только атакующий
      drawCards(gameState.attacker);

      // Ход НЕ переходит: атакующий снова будет атаковать
      gameState.currentPhase = 'attack-initial';
      gameState.turnOwner = gameState.attacker;
      logMessage.textContent = `📥 ${gameState.players[gameState.defender].name} забирает карты.`;
      return true;
    }

    // ==========================================
    // ОТРИСОВКА ИНТЕРФЕЙСА
    // ==========================================
    function renderGame() {
      if (!gameState || !myPlayerId) return;

      const isHostPlayer = myPlayerId === 'host';
      const myHand = isHostPlayer ? gameState.players.host.hand : gameState.players.guest.hand;
      const oppHand = isHostPlayer ? gameState.players.guest.hand : gameState.players.host.hand;

      // Имена
      playerNameDisplay.textContent = localName || 'Вы';
      opponentNameDisplay.textContent = opponentName || 'Соперник';

      // Козырь: только иконка масти, без ранга карты
      if (gameState.trumpSuit) {
        trumpIcon.textContent = gameState.trumpSuit;
        trumpIcon.classList.toggle('trump-red', RED_SUITS.includes(gameState.trumpSuit));
      } else {
        trumpIcon.textContent = '–';
        trumpIcon.classList.remove('trump-red');
      }

      // Счетчик карт в колоде (+1 за открытую козырную карту, если она ещё не вытянута)
      const deckRemaining = gameState.deck ? gameState.deck.length : 0;
      deckCountDisplay.textContent = `${deckRemaining} в колоде`;

      // Счетчики карт в руках
      opponentCardCount.textContent = oppHand.length;
      playerCardCount.textContent = myHand.length;

      const isMyTurn = (gameState.turnOwner === myPlayerId) && !gameState.gameOver;
      const phase = gameState.currentPhase;

      // --- Подсветка активного игрока в шапке ---
      playerTag.classList.toggle('turn-active', isMyTurn);
      opponentTag.classList.toggle('turn-active', !isMyTurn && !gameState.gameOver);
      playerArea.classList.toggle('active-turn-highlight', isMyTurn);

      // --- Рука соперника (рубашки) ---
      opponentCardsRow.innerHTML = '';
      oppHand.forEach((_, i) => {
        const cardDiv = document.createElement('div');
        cardDiv.className = 'card card--back';
        cardDiv.style.animationDelay = (i * 0.04) + 's';
        cardDiv.innerHTML = '<span class="card-rank"></span><span class="card-suit"></span>';
        opponentCardsRow.appendChild(cardDiv);
      });

      // --- Своя рука ---
      playerCardsRow.innerHTML = '';

      myHand.forEach((card, index) => {
        const cardDiv = document.createElement('div');
        const isRed = RED_SUITS.includes(card.suit);
        cardDiv.className = `card ${isRed ? 'red' : ''}`;
        cardDiv.style.animationDelay = (index * 0.04) + 's';
        cardDiv.innerHTML = `<span class="card-rank">${rankSymbol(card.rank)}</span><span class="card-suit">${card.suit}</span>`;

        let playable = false;

        if (isMyTurn && !gameState.gameOver) {
          if (myPlayerId === gameState.attacker) {
            if (phase === 'attack-initial') {
              // Можно положить любую карту
              playable = true;
            } else if (phase === 'attack-continue') {
              // Можно подкинуть только карты рангов, которые есть на столе
              const tableRanks = new Set();
              gameState.table.forEach(p => {
                if (p.attack) tableRanks.add(p.attack.rank);
                if (p.defense) tableRanks.add(p.defense.rank);
              });
              if (tableRanks.has(card.rank)) playable = true;
            }
          } else if (myPlayerId === gameState.defender && phase === 'defend') {
            // Можно побить неотбитую карту
            const unbeaten = gameState.table.find(p => !p.defense);
            if (unbeaten && canBeat(unbeaten.attack, card, gameState.trumpSuit)) {
              playable = true;
            }
          }
        }

        if (playable) {
          cardDiv.classList.add('card--playable');
          cardDiv.addEventListener('click', () => handleCardClick(card, index));
        } else {
          cardDiv.classList.add('card--blocked');
        }

        playerCardsRow.appendChild(cardDiv);
      });

      // --- Игровой стол ---
      tableContainer.innerHTML = '';
      gameState.table.forEach((pair, i) => {
        const pairDiv = document.createElement('div');
        pairDiv.className = 'table-pair';
        pairDiv.style.animationDelay = (i * 0.05) + 's';

        const attackEl = createCardElement(pair.attack);
        pairDiv.appendChild(attackEl);

        if (pair.defense) {
          const vsSpan = document.createElement('span');
          vsSpan.className = 'table-vs';
          vsSpan.textContent = '⚔️';
          pairDiv.appendChild(vsSpan);
          const defenseEl = createCardElement(pair.defense);
          defenseEl.classList.add('defense-card');
          pairDiv.appendChild(defenseEl);
        }

        tableContainer.appendChild(pairDiv);
      });

      // --- Кнопки действий ---
      beatButton.style.display = 'none';
      takeButton.style.display = 'none';

      if (!gameState.gameOver && isMyTurn) {
        if (myPlayerId === gameState.attacker && phase === 'attack-continue') {
          const allBeaten = gameState.table.every(p => p.defense);
          if (allBeaten && gameState.table.length > 0) {
            beatButton.style.display = 'inline-flex';
          }
        } else if (myPlayerId === gameState.defender && phase === 'defend') {
          takeButton.style.display = 'inline-flex';
        }
      }

      // --- Статус ---
      statusMessage.classList.remove('win', 'lose', 'draw');
      if (gameState.gameOver) {
        if (gameState.winner === 'draw') {
          statusMessage.textContent = '🤝 Ничья!';
          statusMessage.classList.add('draw');
        } else if (gameState.winner === myPlayerId) {
          statusMessage.textContent = '🏆 Вы победили!';
          statusMessage.classList.add('win');
        } else {
          statusMessage.textContent = '😞 Вы проиграли...';
          statusMessage.classList.add('lose');
        }
        showGameOverModal();
      } else {
        if (isMyTurn) {
          statusMessage.textContent = myPlayerId === gameState.attacker
            ? '⚔️ Ваш ход — выберите карту для атаки'
            : '🛡️ Вы отбиваетесь — выберите карту';
        } else {
          statusMessage.textContent = '⏳ Ожидание хода соперника...';
        }
      }

      // перезапуск анимации статуса
      statusMessage.style.animation = 'none';
      requestAnimationFrame(() => { statusMessage.style.animation = ''; });
    }

    // ==========================================
    // МОДАЛКА КОНЦА ИГРЫ: красивая анимация
    // ==========================================

    const CONFETTI_COLORS = ['#f0ce6e', '#ffe9a8', '#8de0a3', '#5a8f6c', '#e0c47a', '#ffffff', '#b8962e'];

    /** Генерирует HTML-разметку конфетти-частиц для победы */
    function buildConfettiHTML(count) {
      let html = '';
      for (let i = 0; i < count; i++) {
        const left = Math.random() * 100;
        const size = 6 + Math.random() * 8;
        const color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
        const duration = (2.4 + Math.random() * 2.2).toFixed(2);
        const delay = (Math.random() * 1.6).toFixed(2);
        const drift = Math.round((Math.random() - 0.5) * 160);
        const spin = Math.round(360 + Math.random() * 540) * (Math.random() < 0.5 ? -1 : 1);
        const isCircle = Math.random() < 0.4;
        html += `<div class="confetti-piece" style="left:${left}%; width:${size}px; height:${size * (isCircle ? 1 : 1.6)}px; background:${color}; border-radius:${isCircle ? '50%' : '2px'}; --drift:${drift}px; --spin:${spin}deg; animation-duration:${duration}s; animation-delay:${delay}s;"></div>`;
      }
      return html;
    }

    /** Показывает модалку конца игры с расширенной анимацией: корона, конфетти, VS-блок игроков */
    function showGameOverModal() {
      const isHostPlayer = myPlayerId === 'host';
      const myName = localName || 'Вы';
      const oppName = opponentName || 'Соперник';

      let resultClass = 'result-draw';
      let title = '';
      let sub = '';
      let crownHTML = '';
      let confettiHTML = '';
      let vsSymbol = '🤝';
      let vsClass = '';
      let myChipClass = '';
      let oppChipClass = '';
      let myBadge = '';
      let oppBadge = '';

      if (gameState.winner === 'draw') {
        resultClass = 'result-draw';
        title = '🤝 НИЧЬЯ!';
        sub = 'Колода закончилась — оба игрока остались без карт.';
        vsSymbol = '🤝';
        myBadge = '🃏';
        oppBadge = '🃏';
      } else if (gameState.winner === myPlayerId) {
        resultClass = 'result-win';
        title = '🏆 ПОБЕДА!';
        sub = 'Поздравляем — вы обыграли соперника!';
        crownHTML = '<div class="crown-wrap"><span class="crown-icon anim-win">👑</span></div>';
        confettiHTML = buildConfettiHTML(window.innerWidth < 700 ? 36 : 60);
        vsSymbol = '⚔️';
        vsClass = 'vs-win';
        myChipClass = 'is-winner';
        oppChipClass = 'is-loser';
        myBadge = '👑';
        oppBadge = '💀';
      } else {
        resultClass = 'result-lose';
        title = '😞 ПОРАЖЕНИЕ';
        sub = 'Не расстраивайтесь — попробуйте ещё раз!';
        crownHTML = '<div class="crown-wrap"><span class="crown-icon anim-lose">👑</span></div>';
        vsSymbol = '⚔️';
        vsClass = 'vs-lose';
        myChipClass = 'is-loser';
        oppChipClass = 'is-winner';
        myBadge = '💀';
        oppBadge = '👑';
      }

      gameOverContent.className = 'modal-content ' + resultClass;
      gameOverContent.innerHTML = `
        ${confettiHTML}
        ${crownHTML}
        <div class="modal-result-title">${title}</div>
        <div class="modal-vs-row">
          <div class="modal-player-chip ${myChipClass}">
            <span class="chip-badge">${myBadge}</span>
            <span class="chip-name">${escapeHTML(myName)}</span>
          </div>
          <span class="modal-vs-symbol ${vsClass}">${vsSymbol}</span>
          <div class="modal-player-chip ${oppChipClass}">
            <span class="chip-badge">${oppBadge}</span>
            <span class="chip-name">${escapeHTML(oppName)}</span>
          </div>
        </div>
        <div class="modal-result-sub">${sub}</div>
        <div class="modal-hint">Нажмите в любом месте, чтобы закрыть</div>
      `;

      gameOverModal.style.display = 'flex';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          gameOverModal.classList.add('show');
        });
      });
    }

    /** Простая защита от XSS при вставке имён в innerHTML */
    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    /** Создает DOM-элемент карты (для стола) */
    function createCardElement(card) {
      const div = document.createElement('div');
      const isRed = RED_SUITS.includes(card.suit);
      div.className = `card ${isRed ? 'red' : ''}`;
      div.innerHTML = `<span class="card-rank">${rankSymbol(card.rank)}</span><span class="card-suit">${card.suit}</span>`;
      return div;
    }

    /** Маленькая вспышка лога при обновлении */
    function flashLog() {
      logMessage.classList.remove('log-update');
      requestAnimationFrame(() => {
        logMessage.classList.add('log-update');
      });
    }

    // ==========================================
    // ОБРАБОТЧИКИ КЛИКОВ ПО КАРТАМ
    // ==========================================
    function handleCardClick(card, index) {
      if (!conn || gameState.gameOver) return;

      if (myRole === 'host') {
        // Хост обрабатывает ход локально
        const success = processMove(myPlayerId, card);
        if (success) {
          checkGameOver();
          broadcastStateUpdate();
          renderGame();
          flashLog();
        }
      } else {
        // Гость отправляет запрос на ход хосту
        console.log('[GUEST] Отправка хода:', cardToString(card));
        conn.send({ type: 'move', move: { card } });
        logMessage.textContent = '⏳ Запрос хода отправлен...';
        flashLog();
      }
    }

    // ==========================================
    // ОБРАБОТЧИКИ КНОПОК "БИТО" И "ВЗЯТЬ"
    // ==========================================
    beatButton.addEventListener('click', () => {
      if (myRole === 'host') {
        const success = processBeat();
        if (success) {
          checkGameOver();
          broadcastStateUpdate();
          renderGame();
          flashLog();
        }
      } else {
        conn.send({ type: 'action', action: 'beat' });
        logMessage.textContent = '⏳ Запрос "Бито" отправлен...';
        flashLog();
      }
    });

    takeButton.addEventListener('click', () => {
      if (myRole === 'host') {
        const success = processTake();
        if (success) {
          checkGameOver();
          broadcastStateUpdate();
          renderGame();
          flashLog();
        }
      } else {
        conn.send({ type: 'action', action: 'take' });
        logMessage.textContent = '⏳ Запрос "Взять" отправлен...';
        flashLog();
      }
    });

    // ==========================================
    // СЕТЕВЫЕ ФУНКЦИИ
    // ==========================================

    /** Хост отправляет полное состояние игры гостю */
    function broadcastStateUpdate() {
      if (!conn || myRole !== 'host') return;
      conn.send({
        type: 'state-update',
        gameState: JSON.parse(JSON.stringify(gameState)),
        log: logMessage.textContent
      });
    }

    /** Показать экран игры и скрыть лобби */
    function showGameScreen() {
      lobbyScreen.classList.remove('active');
      gameScreen.classList.add('active');
      console.log('[UI] Переключение на игровой экран');
    }

    /** Показать экран лобби и скрыть игру */
    function showLobbyScreen() {
      gameScreen.classList.remove('active');
      lobbyScreen.classList.add('active');
    }

    // ==========================================
    // НАСТРОЙКА ПОДКЛЮЧЕНИЙ PEERJS
    // ==========================================

    /**
     * Хост: создает комнату и ждет подключения гостя.
     * PeerJS сам генерирует ID комнаты.
     */
    function setupHost(peerInstance) {
      myRole = 'host';
      myPlayerId = 'host';
      opponentId = 'guest';

      peerInstance.on('connection', (connection) => {
        console.log('[HOST] Входящее подключение от гостя');
        conn = connection;
        setupConnectionListeners();
      });

      // Отображаем ID комнаты
      roomDisplay.style.display = 'flex';
      const roomId = peerInstance.id;
      const link = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
      roomDisplay.innerHTML = `
        <span>🆔 Комната: <strong>${roomId}</strong></span>
        <button class="copy-link" id="copyRoomBtn">📋 Копировать ссылку</button>
      `;

      // Навешиваем обработчик на кнопку копирования
      document.getElementById('copyRoomBtn').addEventListener('click', () => {
        copyToClipboard(link);
      });

      // Сразу показываем поле со ссылкой для ручного копирования (надежно работает всегда)
      showLinkField(link);

      lobbyStatus.textContent = 'Ожидание подключения соперника...';
    }

    /**
     * Гость: подключается к хосту по ID комнаты.
     */
    function setupGuest(peerInstance, hostId) {
      myRole = 'guest';
      myPlayerId = 'guest';
      opponentId = 'host';

      console.log('[GUEST] Подключение к хосту:', hostId);
      conn = peerInstance.connect(hostId, { reliable: true });
      setupConnectionListeners();
      lobbyStatus.textContent = 'Подключение к столу...';
    }

    /**
     * Настройка обработчиков событий DataConnection.
     * Это ядро сетевого протокола.
     */
    function setupConnectionListeners() {
      conn.on('open', () => {
        console.log(`[${myRole.toUpperCase()}] Соединение открыто`);
        if (myRole === 'guest') {
          // Гость сразу после открытия соединения отправляет приветствие
          conn.send({ type: 'hello', name: localName });
          logMessage.textContent = '🤝 Отправка приветствия хосту...';
        }
      });

      conn.on('data', (data) => {
        console.log(`[${myRole.toUpperCase()}] Получены данные:`, data.type);

        // --- Обработка HELLO (Хост получает от Гостя) ---
        if (data.type === 'hello' && myRole === 'host') {
          opponentName = data.name;
          gameState.players.guest.name = opponentName;
          opponentNameDisplay.textContent = opponentName;
          // Хост отвечает подтверждением
          conn.send({ type: 'hello-ack', name: localName });
          logMessage.textContent = `👤 Гость "${opponentName}" подключился`;
          lobbyStatus.textContent = `Соперник: ${opponentName}. Ожидание готовности...`;
        }

        // --- Обработка HELLO-ACK (Гость получает от Хоста) ---
        else if (data.type === 'hello-ack' && myRole === 'guest') {
          opponentName = data.name;
          opponentNameDisplay.textContent = opponentName;
          logMessage.textContent = `👤 Подключены к "${opponentName}"`;

          // ТОЛЬКО ПОСЛЕ подтверждения показываем игру и шлем ready
          showGameScreen();
          setTimeout(() => {
            conn.send({ type: 'ready_to_receive' });
            logMessage.textContent = '✅ Готов к получению состояния';
            console.log('[GUEST] Отправлен ready_to_receive');
          }, 100);
        }

        // --- Обработка READY_TO_RECEIVE (Хост получает от Гостя) ---
        else if (data.type === 'ready_to_receive' && myRole === 'host') {
          if (!handshakeComplete) {
            handshakeComplete = true;
            console.log('[HOST] Гость готов. Инициализация игры...');
            initGame();
            showGameScreen();
            setTimeout(() => {
              broadcastStateUpdate();
              renderGame();
              logMessage.textContent = '🎮 Игра началась!';
            }, 150);
          }
        }

        // --- Обработка STATE-UPDATE (Гость получает состояние) ---
        else if (data.type === 'state-update' && myRole === 'guest') {
          gameState = data.gameState;
          if (data.log) logMessage.textContent = data.log;
          renderGame();
          flashLog();
          console.log('[GUEST] Состояние обновлено');
        }

        // --- Обработка MOVE (Хост получает ход от Гостя) ---
        else if (data.type === 'move' && myRole === 'host') {
          console.log('[HOST] Получен ход от гостя:', data.move.card);
          const card = data.move.card;
          const success = processMove('guest', card);
          if (success) {
            checkGameOver();
            broadcastStateUpdate();
            renderGame();
            flashLog();
          } else {
            // Если ход невалиден, переотправляем текущее состояние
            broadcastStateUpdate();
          }
        }

        // --- Обработка ACTION (Хост получает действие от Гостя) ---
        else if (data.type === 'action' && myRole === 'host') {
          console.log('[HOST] Получено действие:', data.action);
          let success = false;
          if (data.action === 'beat') {
            success = processBeat();
          } else if (data.action === 'take') {
            success = processTake();
          }
          if (success) {
            checkGameOver();
            broadcastStateUpdate();
            renderGame();
            flashLog();
          } else {
            broadcastStateUpdate();
          }
        }
      });

      conn.on('close', () => {
        console.log(`[${myRole.toUpperCase()}] Соединение закрыто`);
        logMessage.textContent = '🔌 Соединение потеряно';
        statusMessage.textContent = 'Связь прервана';
        showLobbyScreen();
        resetConnection();
      });

      conn.on('error', (err) => {
        console.error(`[${myRole.toUpperCase()}] Ошибка соединения:`, err);
        logMessage.textContent = '❌ Ошибка сети';
        lobbyStatus.textContent = 'Ошибка подключения';
      });
    }

    /** Сброс состояния соединения */
    function resetConnection() {
      if (conn) {
        conn.close();
        conn = null;
      }
      if (peer) {
        peer.destroy();
        peer = null;
      }
      myRole = null;
      myPlayerId = null;
      handshakeComplete = false;
      roomDisplay.style.display = 'none';
      const wrap = document.getElementById('manualCopyWrap');
      if (wrap) wrap.remove();
      showLobbyScreen();
    }

    // ==========================================
    // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
    // ==========================================

    /** Создает/обновляет видимое поле со ссылкой, которое всегда доступно для копирования вручную */
    function showLinkField(text) {
      let wrap = document.getElementById('manualCopyWrap');
      if (!wrap) {
        wrap = document.createElement('div');
        wrap.id = 'manualCopyWrap';
        wrap.style.display = 'flex';
        wrap.style.flexDirection = 'column';
        wrap.style.gap = '8px';
        wrap.style.width = '100%';
        wrap.style.alignItems = 'center';
        wrap.style.marginTop = '4px';
        wrap.style.position = 'relative';
        wrap.style.zIndex = '1';

        const hint = document.createElement('div');
        hint.id = 'manualCopyHint';
        hint.style.color = '#cbb786';
        hint.style.fontSize = '0.85rem';
        hint.textContent = 'Ссылка для приглашения (нажмите на поле и скопируйте — Ctrl+C / Cmd+C):';
        wrap.appendChild(hint);

        const field = document.createElement('input');
        field.id = 'manualCopyField';
        field.type = 'text';
        field.readOnly = true;
        field.style.width = '100%';
        field.style.textAlign = 'center';
        wrap.appendChild(field);

        roomDisplay.parentNode.insertBefore(wrap, roomDisplay.nextSibling);

        // При фокусе/клике сразу выделяем весь текст для удобства
        field.addEventListener('click', () => field.select());
        field.addEventListener('focus', () => field.select());
      }

      const field = document.getElementById('manualCopyField');
      field.value = text;
      field.style.display = 'block';
    }

    /** Попытка скопировать в буфер обмена с визуальной обратной связью на кнопке */
    function copyToClipboard(text) {
      const btn = document.getElementById('copyRoomBtn');

      const showSuccess = () => {
        if (btn) {
          btn.textContent = '✅ Скопировано!';
          setTimeout(() => { btn.textContent = '📋 Копировать ссылку'; }, 2000);
        }
      };

      const showManualHint = () => {
        const field = document.getElementById('manualCopyField');
        const hint = document.getElementById('manualCopyHint');
        if (field) {
          field.focus();
          field.select();
        }
        if (hint) {
          const old = hint.textContent;
          hint.textContent = '⚠️ Автокопирование заблокировано. Скопируйте вручную из поля ниже:';
          setTimeout(() => { hint.textContent = old; }, 3000);
        }
      };

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(showSuccess).catch(() => {
          if (fallbackCopy(text)) showSuccess();
          else showManualHint();
        });
      } else {
        if (fallbackCopy(text)) showSuccess();
        else showManualHint();
      }
    }

    /** Старый способ копирования через execCommand. Возвращает true/false по успеху. */
    function fallbackCopy(text) {
      const field = document.getElementById('manualCopyField');
      if (field) {
        // Используем уже видимое поле — клонировать значение и выделить
        field.value = text;
        field.focus();
        field.select();
        try {
          return document.execCommand('copy');
        } catch (err) {
          return false;
        }
      }

      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.top = '0';
      textarea.style.left = '0';
      textarea.style.opacity = '0';
      textarea.style.pointerEvents = 'none';
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      let ok = false;
      try {
        ok = document.execCommand('copy');
      } catch (err) {
        ok = false;
      }
      document.body.removeChild(textarea);
      return ok;
    }

    // ==========================================
    // ИНИЦИАЛИЗАЦИЯ ИНТЕРФЕЙСА
    // ==========================================

    /** Автозаполнение ID комнаты из URL */
    function parseURLParams() {
      const urlParams = new URLSearchParams(window.location.search);
      const roomParam = urlParams.get('room');
      if (roomParam) {
        remoteRoomIdInput.value = roomParam;
        console.log('[UI] Автозаполнен ID комнаты из URL:', roomParam);
      }
    }

    /** Обработчик кнопки "Создать стол" */
    hostGameBtn.addEventListener('click', () => {
      localName = playerNameInput.value.trim() || 'Хост';
      gameState.players.host.name = localName;

      if (peer) {
        peer.destroy();
        peer = null;
      }

      peer = new Peer();
      peer.on('open', (id) => {
        console.log('[HOST] PeerJS открыт, ID:', id);
        setupHost(peer);
      });
      peer.on('error', (err) => {
        console.error('[HOST] Ошибка PeerJS:', err);
        lobbyStatus.textContent = 'Ошибка создания комнаты. Попробуйте снова.';
      });
    });

    /** Обработчик кнопки "Подключиться" */
    connectBtn.addEventListener('click', () => {
      localName = playerNameInput.value.trim() || 'Гость';
      const roomId = remoteRoomIdInput.value.trim();

      if (!roomId) {
        alert('Введите ID комнаты для подключения');
        return;
      }

      if (peer) {
        peer.destroy();
        peer = null;
      }

      peer = new Peer();
      peer.on('open', () => {
        console.log('[GUEST] PeerJS открыт, подключаемся к:', roomId);
        setupGuest(peer, roomId);
      });
      peer.on('error', (err) => {
        console.error('[GUEST] Ошибка PeerJS:', err);
        lobbyStatus.textContent = 'Ошибка подключения. Проверьте ID комнаты.';
      });
    });

    /** Закрытие модального окна по клику */
    gameOverModal.addEventListener('click', () => {
      gameOverModal.classList.remove('show');
      setTimeout(() => {
        gameOverModal.style.display = 'none';
        gameOverContent.innerHTML = '';
      }, 350);
    });

    // Запуск
    parseURLParams();
    spawnAmbientSparkles();
    renderGame();
    console.log('[APP] Приложение инициализировано');
  })();
</script>
